name: Build and Deploy

on:
  push:
    branches:
      - dev
      - staging
      - main

env:
  REGISTRY: docker.io
  GCP_PROJECT: dynamic-nomad-477512-n6
  GKE_CLUSTER: autopilot-cluster-1
  GKE_ZONE: us-central1
  DEV_IMAGE: docker.io/nexlura/lepa-portal-dev
  STAGING_IMAGE: docker.io/nexlura/lepa-portal-staging
  PROD_IMAGE: docker.io/nexlura/lepa-portal

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DEV_IMAGE }},enable=${{ github.ref == 'refs/heads/dev' }}
            ${{ env.STAGING_IMAGE }},enable=${{ github.ref == 'refs/heads/staging' }}
            ${{ env.PROD_IMAGE }},enable=${{ github.ref == 'refs/heads/main' }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/staging' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GOPROXY=https://proxy.golang.org,direct
            GOSUMDB=sum.golang.org
          platforms: linux/amd64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI with auth plugin
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT }}
          export_default_credentials: true
          install_components: gke-gcloud-auth-plugin

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --zone ${{ env.GKE_ZONE }} \
            --project ${{ env.GCP_PROJECT }}

      - name: Deploy to Kubernetes
        run: |
          echo "Determining environment and deployment info..."
          case "${GITHUB_REF}" in
            refs/heads/dev)
              NAMESPACE="lepa-dev"
              DEPLOYMENT="nexlura-lepa-dev-portal"
              IMAGE="${DEV_IMAGE}"
              OVERLAY="k8s/overlays/dev"
              ;;
            refs/heads/staging)
              NAMESPACE="lepa-staging"
              DEPLOYMENT="nexlura-lepa-staging-portal"
              IMAGE="${STAGING_IMAGE}"
              OVERLAY="k8s/overlays/staging"
              ;;
            refs/heads/main)
              NAMESPACE="lepa-prod"
              DEPLOYMENT="nexlura-lepa-portal"
              IMAGE="${PROD_IMAGE}"
              OVERLAY="k8s/overlays/production"
              ;;
            *)
              echo "Unknown branch: ${GITHUB_REF}"
              exit 1
              ;;
          esac

          echo "Applying Kubernetes manifests for ${GITHUB_REF}..."
          kubectl apply -k $OVERLAY --validate=false

          echo "Updating deployment image to ${IMAGE}..."
          kubectl set image deployment/$DEPLOYMENT -n $NAMESPACE \
            $DEPLOYMENT=$IMAGE

          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment/$DEPLOYMENT -n $NAMESPACE --timeout=300s
