name: Build and Deploy

on:
  push:
    branches:
      - dev
      - staging
      - main

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/nexlura/lepa-portal-dev,enable=${{ github.ref == 'refs/heads/dev' }}
            ${{ env.REGISTRY }}/nexlura/lepa-portal-staging,enable=${{ github.ref == 'refs/heads/staging' }}
            ${{ env.REGISTRY }}/nexlura/lepa-portal,enable=${{ github.ref == 'refs/heads/main' }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/staging' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GOPROXY=https://proxy.golang.org,direct
            GOSUMDB=sum.golang.org
          platforms: linux/amd64

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Kubernetes
        run: |
          case "${{ github.ref }}" in
            refs/heads/dev)
              echo "Deploying to dev environment"
              kubectl apply -k k8s/overlays/dev
              echo "Restarting deployment to ensure latest changes are picked up"
              kubectl rollout restart deployment nexlura-lepa-dev-portal -n lepa
              kubectl rollout status deployment nexlura-lepa-dev-portal -n lepa --timeout=300s
              ;;
            refs/heads/staging)
              echo "Deploying to staging environment"
              kubectl apply -k k8s/overlays/staging
              echo "Restarting deployment to ensure latest changes are picked up"
              kubectl rollout restart deployment nexlura-lepa-staging-portal -n lepa
              kubectl rollout status deployment nexlura-lepa-staging-portal -n lepa --timeout=300s
              ;;
            refs/heads/main)
              echo "Deploying to production environment"
              kubectl apply -k k8s/overlays/production
              echo "Restarting deployment to ensure latest changes are picked up"
              kubectl rollout restart deployment nexlura-lepa-prod-portal -n lepa
              kubectl rollout status deployment nexlura-lepa-prod-portal -n lepa --timeout=300s
              ;;
            *)
              echo "Unknown branch: ${{ github.ref }}"
              exit 1
              ;;
          esac
