name: Build and Deploy Portal

on:
  push:
    branches: [dev, staging, main]

env:
  REGISTRY: docker.io
  GCP_PROJECT: dynamic-nomad-477512-n6
  GKE_CLUSTER: autopilot-cluster-1
  GKE_ZONE: us-central1
  DEV_UI_IMAGE: docker.io/nexlura/lepa-portal-dev
  STAGING_UI_IMAGE: docker.io/nexlura/lepa-portal-staging
  PROD_UI_IMAGE: docker.io/nexlura/lepa-portal

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DEV_UI_IMAGE }}:latest
            ${{ env.STAGING_UI_IMAGE }}:latest
            ${{ env.PROD_UI_IMAGE }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT }}
          export_default_credentials: true
          install_components: gke-gcloud-auth-plugin
      - run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --zone ${{ env.GKE_ZONE }} \
            --project ${{ env.GCP_PROJECT }}
      - run: |
          case "${GITHUB_REF}" in
            refs/heads/dev)
              OVERLAY="k8s/overlays/dev-portal"
              NAMESPACE="lepa-dev"
              ;;
            refs/heads/staging)
              OVERLAY="k8s/overlays/staging-portal"
              NAMESPACE="lepa-staging"
              ;;
            refs/heads/main)
              OVERLAY="k8s/overlays/production-portal"
              NAMESPACE="lepa-prod"
              ;;
          esac

          echo "Deploying portal UI..."
          kubectl apply -k $OVERLAY --validate=false
          kubectl rollout status deployment -n $NAMESPACE --timeout=300s
