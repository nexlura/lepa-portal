apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
spec:
  replicas: 1  # Staging: single replica for testing
  template:
    spec:
      containers:
        - name: lepa-portal
          image: nexlura/lepa-portal-staging:latest
          envFrom:
            - configMapRef:
                name: nexlura-lepa-staging-env-file
