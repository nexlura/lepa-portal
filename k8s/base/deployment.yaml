apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: lepa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lepa-ui
  template:
    metadata:
      labels:
        app: lepa-ui
    spec:
      containers:
        - name: lepa-ui
          image: nexlura/lepa-ui:latest  # This will be overridden by overlays
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: secrets
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace